name: widget-server pipeline

on:
  push:
    branches:
      - "master"

jobs:
  Test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Configure Node
        id: configure-node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        id: install-pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install dependencies
        id: install-dependencies
        run: |
          pnpm install
      - name: Run migrations
        run: npx dotenv -e .env -- drizzle-kit migrate
        env:
          DATABASE_URL: postgresql://postgres.isxzyggjjpkinczdukdj:wyCki3MZN9W@aws-1-us-east-2.pooler.supabase.com:6543/postgres
          CLOUDFLARE_ACCOUNT_ID: e8d83019b8968eeb453dc1f44f6a1a44
          CLOUDFLARE_ACCESS_KEY_ID: "110236049e817e28a017ced85d425e8b"
          CLOUDFLARE_SECRET_ACCESS_KEY: "2be7f675c47cf2bcc50be412e6ac4e02b754705aa8a07120ced1690c510d527b"
          CLOUDFLARE_BUCKET: upload-server
          CLOUDFLARE_PUBLIC_URL: "https://pub-04c4f7e4faaf4588ba9d22736fc4cdc1.r2.dev"

      - name: Run tests
        id: run-tests
        run: |
          pnpm test
        env:
          DATABASE_URL: postgresql://postgres.isxzyggjjpkinczdukdj:wyCki3MZN9W@aws-1-us-east-2.pooler.supabase.com:6543/postgres
          CLOUDFLARE_ACCOUNT_ID: e8d83019b8968eeb453dc1f44f6a1a44
          CLOUDFLARE_ACCESS_KEY_ID: "110236049e817e28a017ced85d425e8b"
          CLOUDFLARE_SECRET_ACCESS_KEY: "2be7f675c47cf2bcc50be412e6ac4e02b754705aa8a07120ced1690c510d527b"
          CLOUDFLARE_BUCKET: upload-server
          CLOUDFLARE_PUBLIC_URL: "https://pub-04c4f7e4faaf4588ba9d22736fc4cdc1.r2.dev"
          NODE_ENV: test

  Build:
    name: Build
    runs-on: ubuntu-latest
    needs: Test
    environment: production
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        id: configure-aws-credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        id: set-up-docker-buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate tag
        id: generate-tag
        run: |
          SHA=$(echo $GITHUB_SHA | head -c7)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Build image and export to tar
        uses: docker/build-push-action@v6
        with:
          context: .
          load: false
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{steps.login-ecr.outputs.registry}}/${{ vars.ECR_REPOSITORY }}: ${{ steps.generate-tag.outputs.sha}}

      - name: Run Trivy scanner
        id: run-trivy-scanner
        uses: aquasecurity/trivy-action@v0.4.0
        with:
          unput: /tmp/image.tar
          format: "table"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          exit-code: "1"

      - name: Push image to ECR
        id: push-image-to-ecr
        run: |
          docker load --input /tmp/image.tar
          docker push ${{steps.login-ecr.outputs.registry}}/${{ vars.ECR_REPOSITORY }}:${{ steps.generate-tag.outputs.sha }}
          echo "image=${{steps.login-ecr.outputs.registry}}/${{ vars.ECR_REPOSITORY }}:${{ steps.generate-tag.outputs.sha }}" >> $GITHUB_OUTPUT

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ vars.TASK_DEF_FAMILY }} \
            --query taskDefinition | jq 'del(.taskDefinitionArn, .revision, .status, .compatibilities, .requiresAttributes, .enableFaultInjection)' \
            > task-definition.json

      - name: Render Amazon ECS task definition
        id: render-task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ vars.CONTAINER_NAME}}
          image: ${{ steps.push-image-to-ecr.outputs.image }}

      - name: Deploy Amazon ECS
        id: deploy-amazon-ecs
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-definition.outputs.task-definition }}
          service-name: ${{ vars.ECS_SERVICE_NAME }}
          cluster: ${{ vars.CLUSTER_NAME }}
          wait-for-service-stability: true

      # - name: Deploy to App Runner
      #   id: deploy-app-runner
      #   uses: awslabs/amazon-app-runner-deploy@main
      #   with:
      #     service: ${{ vars.APP_RUNNER_SERVICE_NAME }}
      #     image: ${{steps.login-ecr.outputs.registry}}/${{ vars.ECR_REPOSITORY }}:${{ steps.generate-tag.outputs.sha }}
      #     region: ${{ vars.AWS_REGION }}
      #     access-role-arn: "arn:aws:iam::390403897676:role/app-runner-service-role"
      #     cpu: 1
      #     memory: 2
      #     port: 3333
      #     wait-for-service-stability-seconds: 180

